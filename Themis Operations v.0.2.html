<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Themis Operations</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div class="app-tabs" role="tablist" aria-label="Application sections">
        <button class="app-tab active" id="tab-timeline" type="button" role="tab" aria-controls="timeline-panel" data-tab="timeline-panel" aria-selected="true">Timeline</button>
        <button class="app-tab" id="tab-defaults" type="button" role="tab" aria-controls="defaults-panel" data-tab="defaults-panel" aria-selected="false">Mission Defaults</button>
    </div>

    <section id="timeline-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-timeline">
        <div class="card">
            <div class="card-header">
                <h2>Mission Timeline</h2>
                <div class="fy-controls">
                    <button class="btn" id="btn-snap-month">Snap to Current Month</button>
                    <button class="btn" id="btn-snap-7day">7-Day Outlook</button>
                    <button class="btn" id="btn-snap-14day">14-Day Outlook</button>
                    <span class="fy-divider">|</span>
                    <label for="fy-input">FY:</label>
                    <input type="number" id="fy-input">
                    <button class="btn btn-small" id="btn-snap-fy">Snap</button>
                </div>
            </div>

            <div class="timeline-wrapper">
                <div class="timeline-sidebar">
                    <div class="sidebar-header">Status</div>
                    <div id="timeline-labels"></div>
                </div>

                <div id="timeline-viewport">
                    <div id="timeline-years"></div>
                    <div id="timeline-months"></div>
                    <div id="timeline-grid"></div>
                    <div id="timeline-missions"></div>
                </div>
            </div>

            <p class="timeline-tip">
                <em>Tip: Scroll to zoom. Drag to pan. Hover over missions to locate details.</em>
            </p>
        </div>

        <div class="controls">
            <button class="btn" id="btn-new-mission">+ Create New Mission</button>
            <button class="btn" id="btn-import-csv">Import</button>
            <button class="btn" id="btn-export-csv">Export</button>
            <input type="file" id="csv-file-input" accept=".csv" class="hidden-file-input">
        </div>

        <div id="mission-list" class="mission-list-container"></div>
    </section>

    <section id="defaults-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-defaults" hidden>
        <div class="card">
            <div class="card-header">
                <h2>Mission Defaults</h2>
                <button type="button" class="btn btn-small" id="btn-clear-defaults">Reset</button>
            </div>

            <form id="mission-defaults-form" class="defaults-form">
                <div class="form-row">
                    <div class="form-col"><label>Home Field</label><input type="text" id="defaultHomeField"></div>
                </div>
                <button type="submit" class="btn submit-btn">Save Defaults</button>
            </form>
        </div>
    </section>
</div>

<div id="hover-tooltip" class="tooltip"></div>

<div id="mission-modal" class="modal">
    <div class="modal-content">
        <span class="close" id="close-modal">&times;</span>
        <h2 id="modal-title">New Mission</h2>
        
        <form id="mission-form">
            <input type="hidden" id="editMissionId">
            <div class="form-row">
                <div class="form-col"><label>Mission #</label><input type="text" id="missionNum" required></div>
                <div class="form-col"><label>Tail #</label><input type="text" id="tailNum" required></div>
            </div>

            <div class="form-section-title">
                <span>Route</span>
                <button type="button" class="btn btn-small" id="btn-add-leg">+ Add Leg</button>
            </div>
            <div id="legs-wrapper"></div>

            <div class="form-section-title">Crew</div>
            <div class="form-row">
                <div class="form-col"><label>Pilot</label><input type="text" id="pilot"></div>
                <div class="form-col"><label>Co-Pilot</label><input type="text" id="copilot"></div>
            
                <div class="form-col"><label>Crew Chief</label><input type="text" id="crewChief"></div>
                <div class="form-col"><label>Loadmaster(s)</label><input type="text" id="loadmaster"></div>
            </div>

            <div class="form-section-title">Lift</div>
            <div class="form-row">
                <div class="form-col"><label>Customer</label><input type="text" id="liftCustomer" placeholder=""></div>
                <div class="form-col"><label>Pax</label><input type="number" id="liftPax" min="0" placeholder=""></div>
                <div class="form-col"><label>Cargo</label><input type="text" id="liftCargo" placeholder=""></div>
                <div class="form-col"><label>Hazmat</label><input type="text" id="liftHazmat" placeholder=""></div>
            </div>

            <button type="submit" class="btn submit-btn" id="btn-submit-form">Submit Mission</button>
        </form>
    </div>
</div>
    <script src="js/app.js"></script>

</body>
</html>
