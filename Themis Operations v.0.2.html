<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Themis Operations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <div class="app-tabs" role="tablist" aria-label="Application sections">
        <button class="app-tab active" id="tab-timeline" type="button" role="tab" aria-controls="timeline-panel" data-tab="timeline-panel" aria-selected="true">Timeline</button>
        <button class="app-tab" id="tab-defaults" type="button" role="tab" aria-controls="defaults-panel" data-tab="defaults-panel" aria-selected="false">Configuration</button>
    </div>

    <section id="timeline-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-timeline">
        <div class="card">
            <div class="card-header">
                <h2>Mission Timeline</h2>
                <div class="fy-controls">
                    <button class="btn" id="btn-snap-7day">7-Day Outlook</button>
                    <button class="btn" id="btn-snap-14day">14-Day Outlook</button>
                    <button class="btn" id="btn-snap-30day">30-Day Outlook</button>
                    <span class="fy-divider">|</span>
                    <label for="fy-input">FY:</label>
                    <input type="number" id="fy-input">
                    <button class="btn btn-small" id="btn-snap-fy">Snap</button>
                </div>
            </div>

            <div class="timeline-wrapper">
                <div class="timeline-sidebar">
                    <div class="sidebar-header">Status</div>
                    <div id="timeline-labels"></div>
                </div>

                <div id="timeline-viewport">
                    <div id="timeline-years"></div>
                    <div id="timeline-months"></div>
                    <div id="timeline-grid"></div>
                    <div id="timeline-missions"></div>
                </div>
            </div>

            <p class="timeline-tip" id="timeline-tip">
                <em>Tip: Scroll to zoom. Drag to pan. Hover over missions to locate details.</em>
            </p>
        </div>

        <div class="controls">
            <button class="btn" id="btn-new-mission">+ Create New Mission</button>
            <button class="btn" id="btn-import-csv">Import</button>
            <button class="btn" id="btn-export-csv">Export</button>
            <input type="file" id="csv-file-input" accept=".csv" class="hidden-file-input">
        </div>

        <div id="mission-list" class="mission-list-container"></div>
    </section>

    <section id="defaults-panel" class="tab-panel" role="tabpanel" aria-labelledby="tab-defaults" hidden>
        <div class="card">
            <div class="card-header">
                <h2>Mission Defaults Configuration</h2>
                <button type="button" class="btn btn-small" id="btn-clear-defaults">Reset</button>
            </div>

            <form id="mission-defaults-form" class="defaults-form">
                <div class="form-row">
                    <div class="form-col"><label>Home Field</label><input type="text" id="defaultHomeField"></div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label>Sync Backend</label>
                        <select id="defaultSyncBackend">
                            <option value="local-file">Local File</option>
                            <option value="sharepoint-list">SharePoint List</option>
                            <option value="onedrive-file">OneDrive File</option>
                        </select>
                    </div>
                    <div class="form-col" id="sharepoint-sync-status-panel" hidden>
                        <label>SharePoint Status</label>
                        <div class="sync-status-row">
                            <span id="sharepoint-sync-status" class="sync-status-text">Disconnected</span>
                            <button type="button" class="btn btn-small" id="btn-sharepoint-connect">Connect</button>
                            <button type="button" class="btn btn-small" id="btn-sharepoint-sync-now">Sync Now</button>
                        </div>
                    </div>
                    <div class="form-col" id="onedrive-sync-status-panel" hidden>
                        <label>OneDrive Status</label>
                        <div class="sync-status-row">
                            <span id="onedrive-sync-status" class="sync-status-text">Disconnected</span>
                            <button type="button" class="btn btn-small" id="btn-onedrive-connect">Connect</button>
                            <button type="button" class="btn btn-small" id="btn-onedrive-sync-now">Sync Now</button>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <label>Available Tail Numbers</label>
                        <textarea id="defaultTailNumbers" rows="3" placeholder="695, 834, 877"></textarea>
                    </div>
                </div>
                <div class="form-row sync-settings-group" id="local-sync-settings" hidden>
                    <div class="form-col">
                        <label>Mission Data Path</label>
                        <div class="mission-path-picker">
                            <input type="text" id="defaultMissionDataPath" placeholder="themis_missions.json">
                            <button type="button" class="btn btn-small" id="btn-choose-mission-data-file">Choose</button>
                        </div>
                    </div>
                </div>
                <div class="sync-settings-group" id="sharepoint-sync-settings" hidden>
                    <div class="form-row">
                        <div class="form-col"><label>Tenant ID</label><input type="text" id="defaultSharePointTenantId" placeholder="contoso.onmicrosoft.com"></div>
                        <div class="form-col"><label>Client ID</label><input type="text" id="defaultSharePointClientId" placeholder="Azure app registration client ID"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>Site ID</label><input type="text" id="defaultSharePointSiteId" placeholder="contoso.sharepoint.com,site-id,web-id"></div>
                        <div class="form-col"><label>List ID or Name</label><input type="text" id="defaultSharePointListIdentifier" placeholder="Missions"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>Item Title</label><input type="text" id="defaultSharePointItemTitle" placeholder="Themis Operations"></div>
                        <div class="form-col"><label>Payload Field</label><input type="text" id="defaultSharePointPayloadField" placeholder="Payload"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>Redirect URI</label><input type="text" id="defaultSharePointRedirectUri" placeholder="https://example.com/themis-ops.html"></div>
                    </div>
                    <input type="hidden" id="defaultSharePointItemId">
                    <input type="hidden" id="defaultSharePointItemETag">
                </div>
                <div class="sync-settings-group" id="onedrive-sync-settings" hidden>
                    <div class="form-row">
                        <div class="form-col"><label>Tenant ID</label><input type="text" id="defaultOneDriveTenantId" placeholder="contoso.onmicrosoft.com"></div>
                        <div class="form-col"><label>Client ID</label><input type="text" id="defaultOneDriveClientId" placeholder="Azure app registration client ID"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-col"><label>File Path</label><input type="text" id="defaultOneDriveFilePath" placeholder="themis_operations_missions.json"></div>
                        <div class="form-col"><label>Redirect URI</label><input type="text" id="defaultOneDriveRedirectUri" placeholder="https://example.com/themis-ops.html"></div>
                    </div>
                    <input type="hidden" id="defaultOneDriveItemId">
                    <input type="hidden" id="defaultOneDriveItemETag">
                </div>
                <button type="submit" class="btn submit-btn">Save Defaults</button>
            </form>
        </div>
    </section>
</div>

<div id="hover-tooltip" class="tooltip"></div>

<div id="mission-modal" class="modal">
    <div class="modal-content">
        <span class="close" id="close-modal">&times;</span>
        <h2 id="modal-title">New Mission</h2>
        
        <form id="mission-form">
            <input type="hidden" id="editMissionId">
            <div class="form-row">
                <div class="form-col"><label>Mission #</label><input type="text" id="missionNum" placeholder="CNV" required></div>
                <div class="form-col">
                    <label>Tail #</label>
                    <input type="text" id="tailNum" list="tailNumOptions" placeholder="Select or type tail number" required>
                    <datalist id="tailNumOptions"></datalist>
                </div>
            </div>

            <div class="form-section-title">
                <span>Route</span>
                <button type="button" class="btn btn-small" id="btn-add-leg">+ Add Leg</button>
            </div>
            <div id="legs-wrapper"></div>

            <div class="form-section-title">Crew</div>
            <div class="form-row">
                <div class="form-col"><label>Pilot</label><input type="text" id="pilot"></div>
                <div class="form-col"><label>Co-Pilot</label><input type="text" id="copilot"></div>
            
                <div class="form-col"><label>Crew Chief</label><input type="text" id="crewChief"></div>
                <div class="form-col"><label>Loadmaster(s)</label><input type="text" id="loadmaster"></div>
            </div>

            <div class="form-section-title">Lift</div>
            <div class="form-row">
                <div class="form-col"><label>Customer</label><input type="text" id="liftCustomer"></div>
                <div class="form-col"><label>Pax</label><input type="number" id="liftPax" min="0"></div>
                <div class="form-col"><label>Cargo</label><input type="text" id="liftCargo"></div>
                <div class="form-col"><label>Hazmat</label><input type="text" id="liftHazmat"></div>
            </div>

            <button type="submit" class="btn submit-btn" id="btn-submit-form">Submit Mission</button>
        </form>
    </div>
</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
